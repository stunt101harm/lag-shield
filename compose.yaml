services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lagshield
      POSTGRES_PASSWORD: lagshield
      POSTGRES_USER: lagshield
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lagshield -d lagshield']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - lagshield-postgres:/var/lib/postgresql/data

volumes:
  lagshield-postgres:
